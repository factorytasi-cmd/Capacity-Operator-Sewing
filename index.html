<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LITRA-ASI - Sewing Daily Capacity Input</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-dark:#0b0e11;
    --bg-panel:#14181d;
    --bg-panel-2:#1b2026;
    --border:#262c33;
    --teal:#2dd4bf;
    --orange:#f5a623;
    --red:#e0555f;
    --red-bg:#2a1417;
    --yellow:#e0b23f;
    --yellow-bg:#2a2413;
    --green:#3fbf6f;
    --green-bg:#122a1b;
    --text-main:#e7ebee;
    --text-dim:#8a94a0;
    --text-faint:#5c6570;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html, body{
    margin:0;
    height:100%;
  }
  body{
    background:var(--bg-dark);
    color:var(--text-main);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    font-size:14px;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }
  /* ---------- HEADER ---------- */
  header.topbar{
    background:#000;
    padding:12px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .logo{
    width:34px;height:34px;border-radius:8px;
    background:linear-gradient(135deg,var(--teal),#0f8f80);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;color:#04201c;font-size:15px;
  }
  .brand .titles h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.2px;}
  .brand .titles p{margin:0;font-size:11.5px;color:var(--text-dim);}
  .topbar-right{display:flex;align-items:center;gap:16px;}
  .status-dot{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);}
  .status-dot span.dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;}
  .clock{font-size:12.5px;color:var(--text-dim);font-variant-numeric:tabular-nums;}

  /* ---------- STAT BAR ---------- */
  .statbar{
    display:flex;flex-wrap:wrap;gap:14px;
    padding:16px 22px;align-items:stretch;
    flex-shrink:0;
  }
  .stat-card{
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:10px 16px;
    min-width:140px;
  }
  .stat-card .label{font-size:10.5px;letter-spacing:.4px;color:var(--text-faint);text-transform:uppercase;}
  .stat-card .value{font-size:20px;font-weight:600;margin-top:3px;}
  .stat-card .value.small{font-size:14px;font-weight:500;color:var(--text-dim);}
  .spacer{flex:1;}
  .btn{
    border:none;border-radius:8px;
    padding:10px 20px;font-size:13.5px;font-weight:700;
    font-family:'Poppins','Segoe UI',system-ui,sans-serif;
    letter-spacing:.3px;
    cursor:pointer;display:inline-flex;align-items:center;gap:8px;
    transition:opacity .15s ease, transform .05s ease;
  }
  .btn:active{transform:scale(.98);}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .btn-orange{background:var(--orange);color:#241704;}
  .btn-orange:hover:not(:disabled){opacity:.9;}
  .btn-teal{background:var(--teal);color:#04201c;}
  .btn-teal:hover:not(:disabled){opacity:.9;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-main);}
  .btn-ghost:hover:not(:disabled){border-color:var(--teal);color:var(--teal);}
  .btn-danger-ghost{background:transparent;border:1px solid var(--red);color:var(--red);}
  .btn-danger-ghost:hover:not(:disabled){background:var(--red-bg);}

  /* ---------- CONTROL PANEL ---------- */
  .controls{
    margin:0 22px 16px 22px;
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px 18px;
    display:flex;align-items:end;gap:16px;flex-wrap:wrap;
    flex-shrink:0;
  }
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.3px;}
  .field select, .field input[type=date]{
    background:var(--bg-panel-2);
    border:1px solid var(--border);
    color:var(--text-main);
    border-radius:7px;
    padding:9px 12px;
    font-size:13.5px;
    min-width:180px;
  }
  .field select:focus, .field input:focus{outline:1px solid var(--teal);}

  /* ---------- TABLE ---------- */
  .table-wrap{
    margin:0 22px 16px 22px;
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:auto;
    flex:1;
    min-height:0;
  }
  table{border-collapse:collapse;width:100%;min-width:1500px;}
  thead th{
    position:sticky;top:0;z-index:3;
    background:#1a1f25;
    color:var(--text-dim);
    font-size:11px;text-transform:uppercase;letter-spacing:.3px;
    padding:10px 8px;text-align:center;
    border-bottom:1px solid var(--border);
    white-space:nowrap;
  }
  tbody td{
    padding:6px 8px;
    border-bottom:1px solid #1d2228;
    text-align:center;
    white-space:nowrap;
    font-size:13px;
  }
  tbody tr:hover{background:#171c22;}
  td.col-nama, th.col-nama{text-align:left;min-width:150px;}
  td.col-info, th.col-info{text-align:left;max-width:150px;overflow:hidden;text-overflow:ellipsis;}
  th.sticky-1, td.sticky-1{position:sticky;left:0;background:var(--bg-panel);z-index:2;}
  th.sticky-2, td.sticky-2{position:sticky;left:36px;background:var(--bg-panel);z-index:2;}
  thead th.sticky-1, thead th.sticky-2{background:#1a1f25;z-index:4;}
  td.col-no{color:var(--text-faint);}
  .jam-input{
    width:52px;
    background:var(--bg-panel-2);
    border:1px solid var(--border);
    color:var(--text-main);
    border-radius:6px;
    padding:6px 4px;
    text-align:center;
    font-size:13px;
  }
  .jam-input:focus{outline:1px solid var(--teal);}
  .jam-input.filled{border-color:#2f3944;background:#1d232a;}
  .quickfill-input{
    width:70px;
    background:#1a2129;
    border:1px dashed var(--teal);
    color:var(--teal);
    border-radius:6px;
    padding:6px 6px;
    text-align:center;
    font-size:12px;
  }
  .quickfill-input::placeholder{color:#3a7a72;font-size:10.5px;}
  .quickfill-input:focus{outline:1px solid var(--teal);background:#1d2b28;}
  .rerata-val{font-weight:600;}
  .eff-chip{
    display:inline-block;min-width:56px;
    padding:4px 8px;border-radius:6px;
    font-weight:700;font-size:12.5px;
  }
  .eff-green{background:var(--green-bg);color:var(--green);}
  .eff-yellow{background:var(--yellow-bg);color:var(--yellow);}
  .eff-red{background:var(--red-bg);color:var(--red);}
  .eff-empty{color:var(--text-faint);}

  .empty-state{padding:60px 20px;text-align:center;color:var(--text-faint);}
  .empty-state h3{color:var(--text-dim);margin-bottom:6px;font-weight:600;}

  /* ---------- FOOTER ACTION BAR ---------- */
  .footerbar{
    background:#000;border-top:1px solid var(--border);
    padding:14px 22px;
    display:flex;align-items:center;gap:14px;
    flex-shrink:0;
  }
  .save-status{font-size:12.5px;color:var(--text-dim);}
  .save-status.ok{color:var(--green);}
  .save-status.err{color:var(--red);}

  ::-webkit-scrollbar{height:10px;width:10px;}
  ::-webkit-scrollbar-track{background:var(--bg-dark);}
  ::-webkit-scrollbar-thumb{background:#2a3038;border-radius:6px;}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="logo">L</div>
    <div class="titles">
      <h1>LITRA-ASI</h1>
      <p>Lean Intelligence Tracking &amp; Realtime Analytics - ASI</p>
    </div>
  </div>
  <div class="topbar-right">
    <div class="status-dot"><span class="dot"></span><span id="connStatus">Menghubungkan...</span></div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<div class="statbar">
  <div class="stat-card">
    <div class="label">Line Terpilih</div>
    <div class="value" id="statLine">-</div>
  </div>
  <div class="stat-card">
    <div class="label">Jumlah Operator</div>
    <div class="value" id="statCount">0</div>
  </div>
  <div class="stat-card">
    <div class="label">Rata-rata Efisiensi</div>
    <div class="value" id="statEff">-</div>
  </div>
  <div class="stat-card">
    <div class="label">Tanggal Data</div>
    <div class="value small" id="statDate">-</div>
  </div>
  <div class="spacer"></div>
</div>

<div class="controls">
  <div class="field">
    <label>Tanggal</label>
    <input type="date" id="inputTanggal">
  </div>
  <div class="field">
    <label>Pilih Line</label>
    <select id="selectLine"><option value="">Memuat line...</option></select>
  </div>
  <button class="btn btn-teal" id="btnLoad" title="Ambil ulang data operator terbaru dari server (biasanya tidak perlu, cache otomatis)">Refresh Master Data</button>
  <div class="spacer"></div>
</div>

<div class="table-wrap">
  <div id="tableContainer">
    <div class="empty-state">
      <h3>Belum ada data</h3>
      <p>Pilih line untuk menampilkan daftar operator secara otomatis.</p>
    </div>
  </div>
</div>

<div class="footerbar">
  <button class="btn btn-teal" id="btnSave" disabled>Simpan</button>
  <button class="btn btn-orange" id="btnSubmit" disabled>Submit ke Sheet</button>
  <button class="btn btn-danger-ghost" id="btnClear" disabled>Hapus Data</button>
  <div class="save-status" id="saveStatus">Belum ada perubahan</div>
</div>

<script>
// ======================================================
// KONFIGURASI - GANTI DENGAN URL WEB APP APPS SCRIPT ANDA
// ======================================================
const CONFIG = {
  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbw_2cALAGALK13pFVPHHjvJSPrmDV80kSdO-Wtde3laeIVIac24ZTmamh7RURX_SG4/exec',
  JAM_COUNT: 11
};

let currentOperators = []; // state di memori: array of {nip,nama,line,style,proses,target,jam:{}}
let isLocked = false;
let currentLine = '';
let currentTanggal = '';
let syncTimer = null;
let isSyncing = false;

let masterLines = [];
let masterOperators = []; // SEMUA operator aktif, semua line (nama,nip,line,style,proses,target) - tanpa jam

const STORAGE_KEY = 'litra_asi_capacity_draft_v1';
const MASTER_CACHE_KEY = 'litra_asi_master_cache_v1';
const MASTER_CACHE_TTL = 30 * 60 * 1000; // 30 menit

function draftKey(tanggal, line){ return tanggal + '||' + line; }

function loadAllDrafts(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  }catch(e){ return {}; }
}

function saveLocalDraft(tanggal, line, rows){
  const all = loadAllDrafts();
  all[draftKey(tanggal, line)] = { savedAt: Date.now(), rows };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}

function getLocalDraft(tanggal, line){
  const all = loadAllDrafts();
  return all[draftKey(tanggal, line)] || null;
}

function clearLocalDraft(tanggal, line){
  const all = loadAllDrafts();
  delete all[draftKey(tanggal, line)];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}

function persistCurrentToLocal(){
  if(!currentTanggal || !currentLine) return;
  saveLocalDraft(currentTanggal, currentLine, currentOperators.map(op => ({
    nip: op.nip, nama: op.nama, line: op.line, style: op.style, proses: op.proses,
    target: op.target, jam: op.jam
  })));
}

// ---------- CLOCK ----------
function updateClock(){
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('id-ID', {hour12:false});
}
setInterval(updateClock, 1000);
updateClock();

// ---------- DEFAULT TANGGAL = HARI INI ----------
function todayStr(){
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
document.getElementById('inputTanggal').value = todayStr();
document.getElementById('statDate').textContent = todayStr();

// ---------- API HELPERS ----------
async function apiGet(params){
  const url = new URL(CONFIG.APPS_SCRIPT_URL);
  Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
  const res = await fetch(url.toString(), { method:'GET' });
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || 'Terjadi kesalahan pada server');
  return json.data;
}

async function apiPost(body){
  const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
    method:'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  });
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || 'Terjadi kesalahan pada server');
  return json.data;
}

// ---------- MASTER DATA CACHE (operator semua line, cache di browser) ----------

function readMasterCache(){
  try{
    const raw = localStorage.getItem(MASTER_CACHE_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){ return null; }
}

function writeMasterCache(data){
  try{
    localStorage.setItem(MASTER_CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
  }catch(e){}
}

function applyMasterData(data){
  masterLines = data.lines || [];
  masterOperators = data.operators || [];

  const select = document.getElementById('selectLine');
  const prevValue = select.value;
  select.innerHTML = '<option value="">-- Pilih Line --</option>' +
    masterLines.map(l => `<option value="${l}">${l}</option>`).join('');
  if(prevValue && masterLines.includes(prevValue)){
    select.value = prevValue;
  }
  document.getElementById('connStatus').textContent = 'Terhubung';
}

async function loadMasterData(){
  const cached = readMasterCache();
  if(cached && (Date.now() - cached.ts) < MASTER_CACHE_TTL){
    // Cache masih fresh -> tampil instan, refresh diam-diam di background
    applyMasterData(cached.data);
    if(document.getElementById('selectLine').value){
      onLineOrDateChange();
    }
    fetchMasterFromServer(false);
    return;
  }
  // Cache kosong / kadaluarsa -> fetch dengan indikator loading
  await fetchMasterFromServer(true);
}

async function fetchMasterFromServer(showLoading){
  const select = document.getElementById('selectLine');
  if(showLoading){
    select.innerHTML = '<option value="">Memuat line...</option>';
    document.getElementById('connStatus').textContent = 'Menghubungkan...';
  }
  try{
    const data = await apiGet({ action:'getMasterData' });
    writeMasterCache(data);
    applyMasterData(data);
    // Kalau ada line yang sedang dipilih, refresh tampilan (data operator ter-update, jam tetap dari draft lokal)
    if(document.getElementById('selectLine').value){
      onLineOrDateChange();
    }
  }catch(err){
    if(showLoading){
      select.innerHTML = '<option value="">Gagal memuat line</option>';
      document.getElementById('connStatus').textContent = 'Gagal terhubung';
    }
    console.error(err);
  }
}

document.getElementById('btnLoad').addEventListener('click', () => fetchMasterFromServer(true));

loadMasterData();

// ---------- TAMPILKAN OPERATOR PER LINE (murni dari cache, instan) ----------

function onLineOrDateChange(){
  const line = document.getElementById('selectLine').value;
  const tanggal = document.getElementById('inputTanggal').value;

  if(!line){
    currentOperators = [];
    currentLine = ''; currentTanggal = '';
    renderTable();
    document.getElementById('statLine').textContent = '-';
    document.getElementById('statCount').textContent = '0';
    document.getElementById('btnSave').disabled = true;
    document.getElementById('btnSubmit').disabled = true;
    document.getElementById('btnClear').disabled = true;
    return;
  }

  const filtered = masterOperators.filter(op => op.line === line);
  const localDraft = getLocalDraft(tanggal, line);
  const localByNip = {};
  if(localDraft){
    localDraft.rows.forEach(r => { localByNip[String(r.nip)] = r.jam || {}; });
  }

  currentOperators = filtered.map(op => ({
    ...op,
    jam: localByNip[String(op.nip)] || {}
  }));
  currentLine = line;
  currentTanggal = tanggal;
  isLocked = false;

  renderTable();
  document.getElementById('statLine').textContent = line;
  document.getElementById('statCount').textContent = currentOperators.length;
  document.getElementById('statDate').textContent = tanggal;
  document.getElementById('btnSave').disabled = false;
  document.getElementById('btnSubmit').disabled = false;
  document.getElementById('btnClear').disabled = false;
  updateAvgEfficiency();

  if(localDraft){
    setSaveStatus('Melanjutkan draf tersimpan di browser ini.', '');
  }else{
    setSaveStatus('Data dimuat.', '');
    fetchProgressFallback(tanggal, line); // cek siapa tahu ada progress tersimpan di sheet (device/browser lain)
  }
}

async function fetchProgressFallback(tanggal, line){
  try{
    const progress = await apiGet({ action:'getProgress', tanggal, line });
    if(!progress || Object.keys(progress).length === 0) return;
    // pastikan user belum pindah line/tanggal selagi request berjalan
    if(currentLine !== line || currentTanggal !== tanggal) return;

    let changed = false;
    currentOperators.forEach(op => {
      if(progress[op.nip]){
        op.jam = progress[op.nip];
        changed = true;
      }
    });
    if(changed){
      persistCurrentToLocal();
      renderTable();
      updateAvgEfficiency();
      setSaveStatus('Melanjutkan progress tersimpan dari sheet.', '');
    }
  }catch(e){
    // gagal ambil fallback bukan masalah kritis, biarkan senyap
    console.error(e);
  }
}

document.getElementById('selectLine').addEventListener('change', onLineOrDateChange);
document.getElementById('inputTanggal').addEventListener('change', onLineOrDateChange);

// ---------- RENDER TABLE ----------
function renderTable(){
  const container = document.getElementById('tableContainer');
  if(currentOperators.length === 0){
    if(!currentLine){
      container.innerHTML = `<div class="empty-state"><h3>Belum ada data</h3><p>Pilih line untuk menampilkan daftar operator secara otomatis.</p></div>`;
    }else{
      container.innerHTML = `<div class="empty-state"><h3>Tidak ada operator aktif</h3><p>Tidak ditemukan operator aktif pada line ini.</p></div>`;
    }
    return;
  }

  let jamHeaders = '';
  for(let h=1; h<=CONFIG.JAM_COUNT; h++){ jamHeaders += `<th>Jam ${h}</th>`; }

  let rows = currentOperators.map((op, idx) => {
    let jamCells = '';
    for(let h=1; h<=CONFIG.JAM_COUNT; h++){
      const val = op.jam[h] !== undefined ? op.jam[h] : '';
      jamCells += `<td><input type="number" min="0" class="jam-input ${val!==''?'filled':''}"
        data-idx="${idx}" data-jam="${h}" value="${val}" ${isLocked?'disabled':''}></td>`;
    }
    const rerata = computeRerata(op.jam);
    const eff = computeEfficiency(rerata, op.target);
    return `<tr>
      <td class="col-no sticky-1">${idx+1}</td>
      <td class="col-nama sticky-2">${escapeHtml(op.nama)}</td>
      <td>${escapeHtml(op.nip)}</td>
      <td class="col-info" title="${escapeHtml(op.style)}">${escapeHtml(op.style)}</td>
      <td class="col-info" title="${escapeHtml(op.proses)}">${escapeHtml(op.proses)}</td>
      <td>${op.target !== '' ? op.target : '<span class="eff-empty">-</span>'}</td>
      <td><input type="number" min="0" class="quickfill-input" data-idx="${idx}"
        placeholder="Isi 7 jam" title="Isi angka lalu tekan Enter — akan mengisi 7 jam berikutnya yang masih kosong"
        ${isLocked?'disabled':''}></td>
      ${jamCells}
      <td class="rerata-val" data-rerata-idx="${idx}">${rerata !== '' ? rerata.toFixed(1) : '-'}</td>
      <td data-eff-idx="${idx}">${effChip(eff)}</td>
    </tr>`;
  }).join('');

  container.innerHTML = `<table>
    <thead>
      <tr>
        <th class="sticky-1">No</th>
        <th class="col-nama sticky-2">Nama</th>
        <th>No. Absen</th>
        <th class="col-info">Style</th>
        <th class="col-info">Proses</th>
        <th>Target</th>
        <th>Isi 7 Jam</th>
        ${jamHeaders}
        <th>Rerata</th>
        <th>Efisiensi</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;

  container.querySelectorAll('.jam-input').forEach(input => {
    input.addEventListener('input', onJamInput);
    input.addEventListener('keydown', onJamKeydown);
  });
  container.querySelectorAll('.quickfill-input').forEach(input => {
    input.addEventListener('keydown', onQuickFillKeydown);
    input.addEventListener('blur', onQuickFillBlur);
  });
}

function onQuickFillKeydown(e){
  if(e.key === 'Enter' || e.keyCode === 13){
    e.preventDefault();
    e.stopPropagation();
    e.target.blur(); // blur akan memicu onQuickFillBlur -> applyQuickFill
  }
}

function onQuickFillBlur(e){
  applyQuickFill(e.target);
}

function applyQuickFill(inputEl){
  const idx = Number(inputEl.dataset.idx);
  const raw = inputEl.value;
  inputEl.value = ''; // kotak ini cuma pemicu, bukan tempat penyimpanan
  if(raw === '' || isNaN(raw)) return;

  const value = Number(raw);
  const op = currentOperators[idx];

  // Cari jam kosong pertama sebagai titik mulai
  let startH = null;
  for(let h=1; h<=CONFIG.JAM_COUNT; h++){
    if(op.jam[h] === undefined || op.jam[h] === ''){ startH = h; break; }
  }
  if(startH === null) return; // semua jam sudah terisi, tidak ada yang perlu diisi

  const endH = Math.min(startH + 6, CONFIG.JAM_COUNT); // isi 7 jam (termasuk jam mulai)
  for(let h=startH; h<=endH; h++){
    op.jam[h] = value;
    const jamInput = container_querySelectorJam(idx, h);
    if(jamInput){
      jamInput.value = value;
      jamInput.classList.add('filled');
    }
  }

  const rerata = computeRerata(op.jam);
  const eff = computeEfficiency(rerata, op.target);
  document.querySelector(`[data-rerata-idx="${idx}"]`).textContent = rerata !== '' ? rerata.toFixed(1) : '-';
  document.querySelector(`[data-eff-idx="${idx}"]`).innerHTML = effChip(eff);

  persistCurrentToLocal();
  setSaveStatus('Tersimpan di browser (belum dikirim ke sheet).', '');
  updateAvgEfficiency();
}

function container_querySelectorJam(idx, h){
  return document.querySelector(`.jam-input[data-idx="${idx}"][data-jam="${h}"]`);
}

function onJamKeydown(e){
  if(e.key !== 'Enter') return;
  e.preventDefault();
  const idx = Number(e.target.dataset.idx);
  const jam = e.target.dataset.jam;
  const nextInput = document.querySelector(`.jam-input[data-idx="${idx+1}"][data-jam="${jam}"]`);
  if(nextInput){
    nextInput.focus();
    nextInput.select();
  }else{
    e.target.blur(); // sudah baris terakhir, tidak ada lagi di bawahnya
  }
}

function onJamInput(e){
  const idx = Number(e.target.dataset.idx);
  const jamKe = e.target.dataset.jam;
  const val = e.target.value;
  currentOperators[idx].jam[jamKe] = val === '' ? '' : Number(val);
  e.target.classList.toggle('filled', val !== '');

  const rerata = computeRerata(currentOperators[idx].jam);
  const eff = computeEfficiency(rerata, currentOperators[idx].target);
  document.querySelector(`[data-rerata-idx="${idx}"]`).textContent = rerata !== '' ? rerata.toFixed(1) : '-';
  document.querySelector(`[data-eff-idx="${idx}"]`).innerHTML = effChip(eff);

  persistCurrentToLocal();
  setSaveStatus('Tersimpan di browser (belum dikirim ke sheet).', '');
  updateAvgEfficiency();
}

function computeRerata(jamObj){
  const vals = Object.values(jamObj).filter(v => v !== '' && v !== undefined && !isNaN(v)).map(Number);
  if(vals.length === 0) return '';
  return vals.reduce((a,b) => a+b, 0) / vals.length;
}

function computeEfficiency(rerata, target){
  if(rerata === '' || !target || Number(target) <= 0) return '';
  return (rerata / Number(target)) * 100;
}

function effChip(eff){
  if(eff === '') return '<span class="eff-empty">-</span>';
  let cls = 'eff-red';
  if(eff >= 100) cls = 'eff-green';
  else if(eff >= 85) cls = 'eff-yellow';
  return `<span class="eff-chip ${cls}">${eff.toFixed(1)}%</span>`;
}

function updateAvgEfficiency(){
  const effs = currentOperators
    .map(op => computeEfficiency(computeRerata(op.jam), op.target))
    .filter(e => e !== '');
  const el = document.getElementById('statEff');
  if(effs.length === 0){ el.textContent = '-'; return; }
  const avg = effs.reduce((a,b)=>a+b,0) / effs.length;
  el.textContent = avg.toFixed(1) + '%';
}

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function setSaveStatus(text, type){
  const el = document.getElementById('saveStatus');
  el.textContent = text;
  el.className = 'save-status' + (type ? ' ' + type : '');
}

// ---------- SAVE (lokal) & SUBMIT (kirim ke sheet) ----------
function doSaveLocal(){
  persistCurrentToLocal();
  const now = new Date().toLocaleTimeString('id-ID', {hour12:false});
  setSaveStatus('Tersimpan di browser pukul ' + now + ' (belum dikirim ke sheet).', 'ok');
}

async function doSubmit(){
  const tanggal = currentTanggal;
  const rows = currentOperators.map(op => ({
    nip: op.nip, nama: op.nama, line: op.line, style: op.style, proses: op.proses,
    target: op.target, jam: op.jam
  }));

  const btnSave = document.getElementById('btnSave');
  const btnSubmit = document.getElementById('btnSubmit');
  const btnClear = document.getElementById('btnClear');
  btnSave.disabled = true; btnSubmit.disabled = true; btnClear.disabled = true;
  setSaveStatus('Mengirim submit final ke sheet...', '');

  while(isSyncing){ await new Promise(r => setTimeout(r, 200)); }
  isSyncing = true;
  try{
    await apiPost({ action:'submit', tanggal, rows });
    const now = new Date().toLocaleTimeString('id-ID', {hour12:false});
    clearLocalDraft(currentTanggal, currentLine);
    isLocked = true;
    renderTable();
    setSaveStatus('Berhasil disubmit final ke sheet pukul ' + now, 'ok');
  }catch(err){
    setSaveStatus('Gagal submit ke sheet: ' + err.message + ' (data tetap aman di browser, coba Submit lagi)', 'err');
  }finally{
    isSyncing = false;
    btnSave.disabled = isLocked; btnSubmit.disabled = isLocked; btnClear.disabled = isLocked;
  }
}

function doClearData(){
  if(!currentLine){ return; }
  const konfirmasi = confirm(
    'Hapus SEMUA data jam yang sudah diisi untuk Line ' + currentLine + ' tanggal ' + currentTanggal + '?\n\n' +
    'Ini hanya menghapus draf di browser ini. Data yang sudah pernah di-Submit ke Google Sheet tidak akan terhapus.'
  );
  if(!konfirmasi) return;

  currentOperators.forEach(op => { op.jam = {}; });
  clearLocalDraft(currentTanggal, currentLine);
  renderTable();
  updateAvgEfficiency();
  setSaveStatus('Data draf di browser sudah dihapus.', '');
}

document.getElementById('btnSave').addEventListener('click', doSaveLocal);
document.getElementById('btnClear').addEventListener('click', doClearData);
document.getElementById('btnSubmit').addEventListener('click', () => {
  if(confirm('Data akan dikirim final ke Google Sheet dan tidak bisa diedit lagi lewat draf browser. Lanjutkan?')){
    doSubmit();
  }
});
</script>
